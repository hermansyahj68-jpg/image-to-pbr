<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image to PBR Texture Tool</title>

<!-- ICON -->
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<!-- SEO -->
<meta name="description" content="Convert image into PBR texture maps automatically">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
background:#121212;
color:#e0e0e0;
text-align:center;
padding:20px;
margin:0;
}

header{
margin-bottom:25px;
}

header img{
width:160px;
margin-bottom:10px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
max-width:1000px;
margin:auto;
}

.card{
background:#1e1e1e;
padding:15px;
border-radius:12px;
border:1px solid #333;
}

canvas{
width:100%;
border-radius:8px;
background:#000;
}

h3{
font-size:14px;
margin-bottom:10px;
color:#00ff88;
}

.controls{
background:#252525;
padding:20px;
border-radius:15px;
display:inline-block;
margin-bottom:25px;
}

input[type="file"]{
margin-bottom:15px;
}

.btn-zip{
background:#007bff;
color:white;
border:none;
padding:12px 25px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
display:none;
}

.loading-text{
display:none;
color:#ffcc00;
margin-top:10px;
}

footer{
margin-top:40px;
opacity:0.6;
font-size:13px;
}

</style>

</head>


<body>

<header>

<img src="logo.png">

<h2>Image to PBR Texture Tool</h2>

<p>Convert image into PBR texture maps instantly</p>

</header>



<div class="controls">

<input type="file" id="upload" accept="image/*"><br>

<button id="downloadZip" class="btn-zip">
Download Semua sebagai ZIP
</button>

<div id="loading" class="loading-text">
Sedang memproses ZIP...
</div>

</div>



<div class="container">

<div class="card">
<h3>thumb.jpg</h3>
<canvas id="thumbCanvas"></canvas>
</div>

<div class="card">
<h3>color.jpg</h3>
<canvas id="colorCanvas"></canvas>
</div>

<div class="card">
<h3>bmp.jpg</h3>
<canvas id="heightCanvas"></canvas>
</div>

<div class="card">
<h3>normal.jpg</h3>
<canvas id="normalCanvas"></canvas>
</div>

</div>



<footer>
Created by Hermansyah
</footer>



<script>

const upload=document.getElementById("upload")
const btnZip=document.getElementById("downloadZip")
const loading=document.getElementById("loading")

const canvases={
thumb:document.getElementById("thumbCanvas"),
color:document.getElementById("colorCanvas"),
height:document.getElementById("heightCanvas"),
normal:document.getElementById("normalCanvas")
}


upload.addEventListener("change",e=>{

const file=e.target.files[0]
if(!file)return

const reader=new FileReader()

reader.onload=event=>{

const img=new Image()

img.onload=()=>{
processPBR(img)
btnZip.style.display="inline-block"
}

img.src=event.target.result

}

reader.readAsDataURL(file)

})


function processPBR(img){

const size=512

Object.values(canvases).forEach(c=>{
c.width=size
c.height=size
})

const ctxColor=canvases.color.getContext("2d")
ctxColor.drawImage(img,0,0,size,size)

const ctxThumb=canvases.thumb.getContext("2d")
ctxThumb.drawImage(img,0,0,size,size)

const imgData=ctxColor.getImageData(0,0,size,size)
const data=imgData.data

const ctxHeight=canvases.height.getContext("2d")
const heightData=ctxHeight.createImageData(size,size)

for(let i=0;i<data.length;i+=4){

let v=(data[i]+data[i+1]+data[i+2])/3

heightData.data[i]=v
heightData.data[i+1]=v
heightData.data[i+2]=v
heightData.data[i+3]=255

}

ctxHeight.putImageData(heightData,0,0)


const ctxNormal=canvases.normal.getContext("2d")
const normalData=ctxNormal.createImageData(size,size)

for(let y=0;y<size;y++){

for(let x=0;x<size;x++){

let i=(y*size+x)*4

let xL=data[((y*size+Math.max(x-1,0))*4)]
let xR=data[((y*size+Math.min(x+1,size-1))*4)]

let yU=data[((Math.max(y-1,0)*size+x)*4)]
let yD=data[((Math.min(y+1,size-1)*size+x)*4)]

normalData.data[i]=(xL-xR)+128
normalData.data[i+1]=(yU-yD)+128
normalData.data[i+2]=255
normalData.data[i+3]=255

}

}

ctxNormal.putImageData(normalData,0,0)

}



btnZip.addEventListener("click",async()=>{

loading.style.display="block"
btnZip.disabled=true

const zip=new JSZip()

for(const name in canvases){

const dataUrl=canvases[name].toDataURL("image/jpeg",0.9)
const base64=dataUrl.split(",")[1]

zip.file(name+".jpg",base64,{base64:true})

}

const content=await zip.generateAsync({type:"blob"})

const link=document.createElement("a")
link.href=URL.createObjectURL(content)
link.download="PBR_Textures.zip"
link.click()

loading.style.display="none"
btnZip.disabled=false

})



// SERVICE WORKER

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js")

}

</script>

</body>
</html>
